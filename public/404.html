<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>MironFit</title>
    <script>
      // Redireciona qualquer rota desconhecida (refresh ou link direto) de volta
      // ao SPA, codificando o caminho na query string. O index.html decodifica.
      // pathSegmentsToKeep = 1 preserva o subcaminho do projeto (/mironfit/).
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
